services:
  - type: web
    name: lumina1-3
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py create_superuser && python manage.py collectstatic --noinput
    startCommand: gunicorn lumina.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: suhani
      - key: DJANGO_SUPERUSER_EMAIL
        value: suhani@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: lumina1-3.onrender.com