services:
  - type: web
    name: lumina1-3
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py create_superuser
    startCommand: gunicorn lumina.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: suhani
      - key: DJANGO_SUPERUSER_EMAIL
        value: suhanimodi7090@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: lumina1-3.onrender.com