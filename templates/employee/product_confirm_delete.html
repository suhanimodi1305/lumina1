{% extends 'base.html' %}
{% block title %}Delete {{ product.name }}{% endblock %}
{% block page_title %}Delete Product{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
  <div style="background:var(--surface);border:1px solid #fecaca;border-radius:16px;padding:1.75rem;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,.07);">
    <div style="font-size:2.5rem;margin-bottom:1rem;">🗑️</div>
    <h3 style="font-size:1.2rem;margin-bottom:.5rem;">Delete "{{ product.name }}"?</h3>
    <p style="color:var(--muted);font-size:.875rem;margin-bottom:1.5rem;">This action cannot be undone. The product will be permanently removed.</p>
    <form method="post" style="display:flex;gap:.65rem;justify-content:center;">
      {% csrf_token %}
      <button type="submit" style="padding:.6rem 1.4rem;background:#ef4444;color:#fff;border:none;border-radius:100px;font-weight:600;cursor:pointer;">
        <i class="bi bi-trash"></i> Yes, Delete
      </button>
      <a href="{% url 'employee:product_detail' pk=product.pk %}"
         style="padding:.6rem 1.4rem;background:var(--surface-alt);color:var(--text);border:1px solid var(--border);border-radius:100px;font-weight:600;text-decoration:none;">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
