{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}
{% if user.is_authenticated %}
<style>
/* ── Lumina Admin: Session Expiry Modal ── */
#lux-adm-modal{
  display:none;position:fixed;inset:0;z-index:999999;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
#lux-adm-modal .lux-adm-box{
  background:#1e293b;border:1px solid rgba(255,255,255,.12);
  border-radius:16px;padding:2rem 2.5rem;max-width:400px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center;
  animation:ladmin-in .2s ease;
}
@keyframes ladmin-in{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
#lux-adm-modal h2{color:#fff;font-size:1.15rem;margin:0 0 .4rem;}
#lux-adm-modal p{color:rgba(255,255,255,.55);font-size:.85rem;margin:0 0 1.25rem;line-height:1.5;}
#lux-adm-countdown{color:#f59e0b;font-size:1.2rem;font-weight:700;}
.lux-adm-btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;}
.lux-adm-stay{
  padding:.6rem 1.4rem;background:#0d9488;color:#fff;border:none;
  border-radius:100px;font-size:.87rem;font-weight:700;cursor:pointer;
}
.lux-adm-stay:hover{background:#0f766e;}
.lux-adm-logout{
  padding:.6rem 1.4rem;background:rgba(239,68,68,.15);color:#ef4444;
  border:1px solid rgba(239,68,68,.3);border-radius:100px;
  font-size:.87rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;
}
#lux-adm-bar-wrap{margin-top:1.1rem;height:3px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
#lux-adm-bar{height:100%;background:#0d9488;transition:width 1s linear;}
</style>

<div id="lux-adm-modal">
  <div class="lux-adm-box">
    <div style="font-size:2rem;margin-bottom:.75rem;">⏱</div>
    <h2>Admin Session Expiring</h2>
    <p>Your admin session expires in <span id="lux-adm-countdown"></span>.<br>Save your work and stay logged in.</p>
    <div class="lux-adm-btns">
      <button class="lux-adm-stay" id="lux-adm-stay-btn">Stay Logged In</button>
      <a class="lux-adm-logout" href="/admin/logout/">Logout Now</a>
    </div>
    <div id="lux-adm-bar-wrap"><div id="lux-adm-bar" style="width:100%;"></div></div>
  </div>
</div>

<script>
(function(){
  const WARN_AT = 120;
  const POLL_MS = 30000;
  let tickTimer = null;
  let secsLeft  = 0;
  let shown     = false;

  const modal     = document.getElementById('lux-adm-modal');
  const cdEl      = document.getElementById('lux-adm-countdown');
  const bar       = document.getElementById('lux-adm-bar');
  const stayBtn   = document.getElementById('lux-adm-stay-btn');

  function fmt(s){
    const m=Math.floor(s/60),sec=s%60;
    return m>0?m+'m '+String(sec).padStart(2,'0')+'s':sec+'s';
  }

  function goExpired(){ window.location.href='/admin/login/?expired=1'; }

  function showModal(s){
    if(shown)return;
    shown=true;
    modal.style.display='flex';
    cdEl.textContent=fmt(s);
    bar.style.width='100%';
  }

  function hideModal(){
    shown=false;
    modal.style.display='none';
    clearInterval(tickTimer);
  }

  function startTick(s){
    clearInterval(tickTimer);
    secsLeft=s;
    tickTimer=setInterval(()=>{
      secsLeft--;
      if(secsLeft<=0){clearInterval(tickTimer);goExpired();return;}
      if(shown){
        cdEl.textContent=fmt(secsLeft);
        const pct=Math.min(100,(secsLeft/WARN_AT)*100);
        bar.style.width=pct+'%';
        bar.style.background=secsLeft<30?'#ef4444':secsLeft<60?'#f59e0b':'#0d9488';
      }
    },1000);
  }

  function poll(){
    fetch('/accounts/session-status/',{credentials:'same-origin'})
      .then(r=>r.json())
      .then(d=>{
        if(!d.authenticated){goExpired();return;}
        const s=d.seconds_left;
        if(s<=0){goExpired();return;}
        if(s<=WARN_AT){showModal(s);startTick(s);}
        else{
          hideModal();
          const next=Math.min(POLL_MS,(s-WARN_AT)*1000-5000);
          if(next>0)setTimeout(poll,next);
        }
      })
      .catch(()=>{});
  }

  stayBtn.addEventListener('click',()=>{
    const csrf=document.cookie.match(/csrftoken=([^;]+)/)?.[1]||'';
    fetch('/accounts/session-ping/',{
      method:'POST',credentials:'same-origin',
      headers:{'X-CSRFToken':csrf,'Content-Type':'application/json'},
    })
    .then(r=>r.json())
    .then(d=>{
      if(d.ok){
        hideModal();
        setTimeout(poll,(d.seconds_left-WARN_AT)*1000);
      }
    }).catch(()=>{});
  });

  document.addEventListener('visibilitychange',()=>{if(!document.hidden)poll();});
  window.addEventListener('storage',e=>{
    if(e.key==='lux_session_expired'&&e.newValue==='1')goExpired();
  });

  poll();
  setInterval(poll,POLL_MS);
})();
</script>
{% endif %}
{% endblock %}
