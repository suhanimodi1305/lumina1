{% extends 'base_auth.html' %}
{% block title %}Password Reset Complete — Lumina{% endblock %}
{% block auth_content %}
<div style="text-align:center;padding:1rem 0 .5rem;">
  <div style="font-size:3rem;margin-bottom:.75rem;">✅</div>
  <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem;">Password updated!</h2>
  <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;line-height:1.6;">
    Your password has been set. You can now log in with your new password.
  </p>
  <a href="{% url 'accounts:login' %}" style="
    display:inline-flex;align-items:center;gap:.4rem;
    padding:.55rem 1.4rem;background:#0d9488;color:#fff;
    border-radius:20px;font-size:.85rem;font-weight:600;text-decoration:none;">
    Log In Now
  </a>
</div>
{% endblock %}
