<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Outer circle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(236,72,153,0.18)"/>
    </filter>

    <!-- Face gradient: pink-to-purple-to-blue -->
    <linearGradient id="faceGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f9a8d4"/>
      <stop offset="30%"  stop-color="#e879f9"/>
      <stop offset="60%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Circuit gradient -->
    <linearGradient id="circGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f472b6"/>
      <stop offset="25%"  stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="75%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>

    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- White circle background -->
  <circle cx="200" cy="200" r="195" fill="white" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="190" fill="#fafafa"/>

  <!-- === FACE SILHOUETTE (profile, facing right) === -->
  <g clip-path="url(#circleClip)">

    <!-- Face/head shape -->
    <path d="M195 60
             C195 60 210 55 228 65
             C248 76 262 96 266 118
             C272 144 268 168 264 186
             C260 202 252 216 246 230
             C240 244 234 256 236 272
             C238 286 248 295 244 304
             C240 312 218 310 210 300
             C202 290 206 274 202 260
             C198 246 190 238 186 224
             C180 206 172 188 170 168
             C168 148 170 126 178 108
             C184 94 195 78 195 60 Z"
          fill="url(#faceGrad)" opacity="0.88"/>

    <!-- Hair / back of head -->
    <path d="M195 60
             C185 52 170 50 158 58
             C144 68 138 84 136 100
             C134 116 138 132 142 144
             C130 138 122 126 120 112
             C116 92 124 70 138 58
             C152 46 172 42 190 48
             C198 50 202 56 195 60 Z"
          fill="url(#hairGrad)" opacity="0.9"/>

    <!-- Neck -->
    <path d="M218 295 C214 308 208 318 204 328 C200 338 198 345 200 350
             C210 345 225 335 232 320 C238 308 236 296 236 272
             C236 256 234 244 230 240 C228 248 226 268 218 295 Z"
          fill="url(#faceGrad)" opacity="0.7"/>

    <!-- === EYE (closed, elegant, facing right) === -->
    <!-- Upper lid -->
    <path d="M214 138 C220 133 232 131 242 133 C250 135 256 139 254 143
             C250 148 240 150 230 148 C220 146 212 142 214 138 Z"
          fill="#1e1b4b" opacity="0.92"/>
    <!-- Eyelash sweep -->
    <path d="M212 139 C220 133 232 130 242 132 C248 133 255 136 254 140"
          stroke="#0f0a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Lash flick -->
    <path d="M254 140 C258 135 262 130 265 126"
          stroke="#0f0a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M250 137 C253 131 256 127"
          stroke="#0f0a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Eye shadow — blue/teal tint -->
    <ellipse cx="234" cy="140" rx="20" ry="8" fill="#67e8f9" opacity="0.3"/>
    <ellipse cx="240" cy="137" rx="12" ry="5" fill="#818cf8" opacity="0.25"/>

    <!-- Eyebrow -->
    <path d="M210 126 C218 121 230 120 242 122 C248 123 252 126 250 128"
          stroke="#312e81" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Nose bridge subtle -->
    <path d="M248 164 C252 170 252 178 250 184"
          stroke="#c4a0a0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Lips -->
    <path d="M226 228 C230 222 236 220 242 221 C248 220 254 222 258 228
             C262 234 260 242 256 246 C252 250 246 252 240 251
             C234 250 228 248 226 242 C224 237 225 232 226 228 Z"
          fill="#f43f5e" opacity="0.92"/>
    <!-- Upper lip dip -->
    <path d="M226 228 C232 224 236 222 240 221 C244 222 248 224 258 228"
          stroke="#be123c" stroke-width="1.2" fill="none"/>
    <!-- Lip gloss highlight -->
    <ellipse cx="240" cy="231" rx="9" ry="3.5" fill="rgba(255,255,255,0.38)" transform="rotate(-5,240,231)"/>

    <!-- Cheek blush -->
    <ellipse cx="254" cy="194" rx="18" ry="10" fill="#f9a8d4" opacity="0.28" transform="rotate(-15,254,194)"/>

    <!-- === CIRCUIT BOARD LINES (radiating left from head) === -->

    <!-- Line group 1 — top -->
    <line x1="175" y1="90"  x2="148" y2="76"  stroke="url(#circGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="148" y1="76"  x2="120" y2="68"  stroke="url(#circGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="120" cy="68" r="5" stroke="#f472b6" stroke-width="2" fill="none"/>
    <circle cx="120" cy="68" r="2" fill="#f472b6"/>

    <line x1="170" y1="98"  x2="132" y2="88"  stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="132" y1="88"  x2="108" y2="84"  stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="108" cy="84" r="5" stroke="#c084fc" stroke-width="2" fill="none"/>
    <circle cx="108" cy="84" r="2" fill="#c084fc"/>

    <!-- Line group 2 — mid-top -->
    <line x1="168" y1="112" x2="136" y2="106" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="136" y1="106" x2="108" y2="104" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="108" cy="104" r="5" stroke="#818cf8" stroke-width="2" fill="none"/>
    <circle cx="108" cy="104" r="2" fill="#818cf8"/>

    <line x1="168" y1="126" x2="140" y2="124" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="140" y1="124" x2="110" y2="126" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="110" cy="126" r="5" stroke="#38bdf8" stroke-width="2" fill="none"/>
    <circle cx="110" cy="126" r="2" fill="#38bdf8"/>

    <!-- Line group 3 — mid -->
    <line x1="168" y1="142" x2="142" y2="144" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="142" y1="144" x2="112" y2="148" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="112" cy="148" r="5" stroke="#67e8f9" stroke-width="2" fill="none"/>
    <circle cx="112" cy="148" r="2" fill="#67e8f9"/>

    <!-- Line group 4 — mid-low -->
    <line x1="170" y1="160" x2="146" y2="164" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="146" y1="164" x2="116" y2="170" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="116" cy="170" r="5" stroke="#f472b6" stroke-width="2" fill="none"/>
    <circle cx="116" cy="170" r="2" fill="#f472b6"/>

    <line x1="172" y1="176" x2="148" y2="182" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="148" y1="182" x2="118" y2="188" stroke="url(#circGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="118" cy="188" r="5" stroke="#c084fc" stroke-width="2" fill="none"/>
    <circle cx="118" cy="188" r="2" fill="#c084fc"/>

    <!-- Line group 5 — lower neck area (curving lines) -->
    <path d="M180 210 C160 216 140 218 118 214" stroke="url(#circGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M180 224 C160 232 140 234 118 232" stroke="url(#circGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M184 240 C165 248 148 250 126 248" stroke="url(#circGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Small dash marks (binary/data style) -->
    <rect x="122" y="72"  width="10" height="3" rx="1.5" fill="#f472b6" opacity="0.8"/>
    <rect x="104" y="92"  width="8"  height="3" rx="1.5" fill="#c084fc" opacity="0.8"/>
    <rect x="102" y="112" width="10" height="3" rx="1.5" fill="#818cf8" opacity="0.8"/>
    <rect x="104" y="134" width="8"  height="3" rx="1.5" fill="#38bdf8" opacity="0.8"/>
    <rect x="106" y="156" width="10" height="3" rx="1.5" fill="#67e8f9" opacity="0.8"/>

    <!-- Vertical connector tick marks -->
    <rect x="120" y="60"  width="3" height="10" rx="1.5" fill="#f472b6" opacity="0.7"/>
    <rect x="108" y="76"  width="3" height="10" rx="1.5" fill="#c084fc" opacity="0.7"/>
    <rect x="108" y="96"  width="3" height="8"  rx="1.5" fill="#818cf8" opacity="0.7"/>

    <!-- === TEXT LABELS === -->
    <!-- "MAKEUP AI" bold -->
    <text x="200" y="346"
          font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
          font-size="32" font-weight="900"
          fill="#0f172a" text-anchor="middle" letter-spacing="1">MAKEUP AI</text>
    <!-- "PRECISION BEAUTY VIA DATA" subtitle -->
    <text x="200" y="370"
          font-family="'Arial','Helvetica Neue',Arial,sans-serif"
          font-size="13" font-weight="700"
          fill="#334155" text-anchor="middle" letter-spacing="1.5">PRECISION BEAUTY VIA DATA</text>

  </g>
</svg>
