<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <defs>
    <linearGradient id="lgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded square with gradient -->
  <rect x="1" y="5" width="32" height="32" rx="9" fill="url(#lgrad)"/>
  <!-- Shine overlay -->
  <rect x="1" y="5" width="32" height="16" rx="9" fill="url(#shimmer)"/>
  <!-- Stylised "L" spark mark — vertical bar + dot -->
  <rect x="11" y="11" width="4" height="14" rx="2" fill="white" opacity="0.95"/>
  <rect x="11" y="22" width="12" height="3.5" rx="1.75" fill="white" opacity="0.95"/>
  <!-- Diamond accent / sparkle top-right -->
  <path d="M27 10 L29 13 L27 16 L25 13 Z" fill="white" opacity="0.75"/>

  <!-- Wordmark -->
  <text x="42" y="28"
    font-family="'Cormorant Garamond','Georgia','Times New Roman',serif"
    font-size="22"
    font-weight="700"
    fill="#c9a96e"
    letter-spacing="1.2">Lumina</text>
</svg>
