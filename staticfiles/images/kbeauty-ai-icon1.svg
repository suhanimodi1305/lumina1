<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="vase-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
    <linearGradient id="vase-neck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80cbc4"/>
      <stop offset="100%" stop-color="#4db6ac"/>
    </linearGradient>
  </defs>
  <!-- White circle background -->
  <circle cx="100" cy="100" r="98" fill="white" stroke="#e8f5e9" stroke-width="1.5"/>

  <!-- === VASE body === -->
  <path d="M86 135 C80 130 76 120 76 108 C76 96 80 86 88 80
           C92 77 96 76 100 76 C104 76 108 77 112 80
           C120 86 124 96 124 108 C124 120 120 130 114 135
           C110 138 106 140 100 140 C94 140 90 138 86 135 Z"
        fill="url(#vase-body)" stroke="#80cbc4" stroke-width="1.5"/>
  <!-- Vase neck/rim -->
  <path d="M90 76 C90 72 92 68 95 66 C97 64 100 63 103 64
           C106 65 109 67 110 70 C111 73 110 76 110 76 Z"
        fill="url(#vase-neck)" opacity="0.9"/>
  <!-- Vase rim circle -->
  <ellipse cx="100" cy="76" rx="10" ry="4" fill="none" stroke="#4db6ac" stroke-width="1.8"/>
  <!-- Vase decorative band -->
  <path d="M78 110 C78 110 88 115 100 115 C112 115 122 110 122 110"
        stroke="#4db6ac" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <!-- Vase base -->
  <ellipse cx="100" cy="140" rx="16" ry="4" fill="#80cbc4" opacity="0.6"/>

  <!-- === CAMELLIA branches and flowers === -->
  <!-- Main trunk from vase top -->
  <path d="M100 63 C100 55 98 44 95 38" stroke="#5d4037" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M100 63 C102 52 106 42 110 36" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left branch -->
  <path d="M97 52 C90 48 80 44 68 42" stroke="#5d4037" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M95 45 C86 40 74 36 62 34" stroke="#5d4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right branch -->
  <path d="M103 50 C112 45 124 42 136 40" stroke="#5d4037" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M107 43 C116 38 128 34 140 32" stroke="#5d4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- === GREEN LEAVES === -->
  <ellipse cx="73" cy="46" rx="8" ry="4" fill="#388e3c" transform="rotate(-30,73,46)" opacity="0.9"/>
  <ellipse cx="65" cy="37" rx="7" ry="3.5" fill="#43a047" transform="rotate(-15,65,37)" opacity="0.9"/>
  <ellipse cx="130" cy="43" rx="8" ry="4" fill="#388e3c" transform="rotate(20,130,43)" opacity="0.9"/>
  <ellipse cx="139" cy="35" rx="7" ry="3.5" fill="#43a047" transform="rotate(10,139,35)" opacity="0.9"/>
  <ellipse cx="97" cy="58" rx="6" ry="3" fill="#2e7d32" transform="rotate(-40,97,58)" opacity="0.9"/>
  <ellipse cx="104" cy="55" rx="6" ry="3" fill="#388e3c" transform="rotate(35,104,55)" opacity="0.9"/>

  <!-- === RED CAMELLIA FLOWERS === -->
  <!-- Flower 1 - top center -->
  <circle cx="95" cy="34" r="7" fill="#c62828" opacity="0.9"/>
  <circle cx="95" cy="28" r="5" fill="#d32f2f" opacity="0.85"/>
  <circle cx="90" cy="32" r="5" fill="#c62828" opacity="0.85"/>
  <circle cx="100" cy="32" r="5" fill="#e53935" opacity="0.85"/>
  <circle cx="95" cy="34" r="3" fill="#ffeb3b" opacity="0.8"/><!-- stamens -->

  <!-- Flower 2 - top right -->
  <circle cx="118" cy="31" r="6" fill="#b71c1c" opacity="0.9"/>
  <circle cx="118" cy="26" r="4.5" fill="#c62828" opacity="0.85"/>
  <circle cx="113" cy="30" r="4.5" fill="#b71c1c" opacity="0.85"/>
  <circle cx="123" cy="30" r="4.5" fill="#d32f2f" opacity="0.85"/>
  <circle cx="118" cy="31" r="2.5" fill="#fdd835" opacity="0.8"/>

  <!-- Flower 3 - left -->
  <circle cx="68" cy="39" r="6" fill="#c62828" opacity="0.9"/>
  <circle cx="68" cy="34" r="4.5" fill="#d32f2f" opacity="0.85"/>
  <circle cx="63" cy="38" r="4.5" fill="#c62828" opacity="0.85"/>
  <circle cx="73" cy="38" r="4.5" fill="#e53935" opacity="0.85"/>
  <circle cx="68" cy="39" r="2.5" fill="#fdd835" opacity="0.8"/>

  <!-- Flower bud right far -->
  <circle cx="142" cy="30" r="4" fill="#ef5350" opacity="0.85"/>
  <circle cx="142" cy="26" r="3" fill="#e53935" opacity="0.8"/>
  <circle cx="142" cy="30" r="1.5" fill="#fdd835" opacity="0.7"/>

  <!-- === MAGPIE (black & white bird on vase) === -->
  <!-- Body -->
  <ellipse cx="88" cy="110" rx="7" ry="5" fill="#212121" transform="rotate(-10,88,110)"/>
  <!-- White belly -->
  <ellipse cx="89" cy="111" rx="4" ry="3" fill="#fafafa" transform="rotate(-10,89,111)"/>
  <!-- Head -->
  <circle cx="83" cy="106" r="4.5" fill="#212121"/>
  <!-- White cheek -->
  <ellipse cx="82" cy="107" rx="2" ry="1.5" fill="#fafafa" opacity="0.9"/>
  <!-- Beak -->
  <path d="M79 106 L76 105 L79 107 Z" fill="#424242"/>
  <!-- Eye -->
  <circle cx="81" cy="105" r="1" fill="white"/>
  <circle cx="81" cy="105" r="0.5" fill="#1a237e"/>
  <!-- Tail -->
  <path d="M94 113 C98 116 102 118 104 115 C102 112 98 110 94 112 Z" fill="#1a237e" opacity="0.9"/>
  <!-- Wing blue shine -->
  <path d="M86 108 C90 107 94 109 94 112 C91 111 87 110 86 108 Z" fill="#1565c0" opacity="0.7"/>

  <!-- === TIGER (on vase, right side) === -->
  <!-- Body -->
  <ellipse cx="112" cy="115" rx="8" ry="6" fill="#f57c00" transform="rotate(10,112,115)"/>
  <!-- Stripes -->
  <line x1="110" y1="110" x2="108" y2="120" stroke="#4e342e" stroke-width="1.5" opacity="0.8"/>
  <line x1="114" y1="109" x2="112" y2="119" stroke="#4e342e" stroke-width="1.5" opacity="0.8"/>
  <line x1="117" y1="111" x2="116" y2="119" stroke="#4e342e" stroke-width="1.3" opacity="0.8"/>
  <!-- Head -->
  <circle cx="105" cy="110" r="5.5" fill="#fb8c00"/>
  <!-- Tiger face markings -->
  <line x1="103" y1="107" x2="102" y2="112" stroke="#4e342e" stroke-width="1" opacity="0.7"/>
  <line x1="107" y1="107" x2="108" y2="112" stroke="#4e342e" stroke-width="1" opacity="0.7"/>
  <!-- Snout -->
  <ellipse cx="105" cy="112" rx="3" ry="2" fill="#ffcc80"/>
  <!-- Eyes -->
  <circle cx="103" cy="109" r="1.2" fill="#f9a825"/>
  <circle cx="107" cy="109" r="1.2" fill="#f9a825"/>
  <circle cx="103" cy="109" r="0.5" fill="#1a237e"/>
  <circle cx="107" cy="109" r="0.5" fill="#1a237e"/>
  <!-- Legs -->
  <line x1="108" y1="120" x2="107" y2="127" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="113" y1="121" x2="113" y2="128" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>

  <!-- Water wave at vase base -->
  <path d="M80 130 C85 127 90 129 95 127 C100 125 105 128 110 126 C115 124 120 127 122 130"
        stroke="#29b6f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M82 134 C87 131 93 133 98 131 C103 129 108 132 114 130 C117 129 120 131 121 134"
        stroke="#4fc3f7" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Outer teal ring on vase neck -->
  <path d="M88 80 C90 78 95 77 100 77 C105 77 110 78 112 80"
        stroke="#00897b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M88 82 C90 80 95 79 100 79 C105 79 110 80 112 82"
        stroke="#80cbc4" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
