<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="steth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#7e57c2"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
  </defs>

  <!-- White circle background -->
  <circle cx="100" cy="100" r="98" fill="white" stroke="#e8eaf6" stroke-width="1.5"/>

  <!-- === HEART shape (left side of icon) === -->
  <path d="M88 72 C88 65 80 58 72 62 C64 66 63 76 68 84
           C72 90 80 96 88 104 C96 96 104 90 108 84
           C113 76 112 66 104 62 C96 58 88 65 88 72 Z"
        fill="url(#heart)" opacity="0.9"/>
  <!-- Heart shine -->
  <ellipse cx="80" cy="69" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20,80,69)"/>

  <!-- === BRAIN (right side, overlapping) === -->
  <!-- Brain outer shape -->
  <path d="M100 65 C106 62 114 63 119 68 C124 73 124 80 121 86
           C124 90 125 96 122 101 C125 105 124 112 119 115
           C116 120 109 121 104 118 C100 116 98 112 98 108
           C95 111 90 112 87 110 C87 104 92 100 95 96
           C92 92 92 86 95 82 C98 78 100 72 100 65 Z"
        fill="none" stroke="url(#brain)" stroke-width="2.2"/>
  <!-- Brain internal lines -->
  <path d="M100 70 C103 74 102 80 100 84" stroke="url(#brain)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M107 68 C111 72 112 78 109 84" stroke="url(#brain)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M115 74 C118 78 118 85 115 90" stroke="url(#brain)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M95 88 C99 92 103 94 107 92" stroke="url(#brain)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M96 100 C100 103 105 104 109 102" stroke="url(#brain)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- === STETHOSCOPE === -->
  <!-- Ear tubes -->
  <path d="M74 108 C72 112 72 118 74 122 C76 128 82 132 88 132
           C94 132 100 128 102 122 C104 118 104 114 102 110"
        stroke="url(#steth)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Chest piece -->
  <circle cx="88" cy="136" r="8" stroke="url(#steth)" stroke-width="2.5" fill="none"/>
  <circle cx="88" cy="136" r="3" fill="url(#steth)" opacity="0.6"/>
  <!-- Tube going up-right -->
  <path d="M96 136 C100 136 104 132 106 128 C108 124 106 118 104 114"
        stroke="url(#steth)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Left ear tip -->
  <circle cx="74" cy="108" r="4" fill="#42a5f5"/>
  <!-- Right ear tip -->
  <circle cx="102" cy="110" r="4" fill="#7e57c2"/>

  <!-- === CIRCUIT NODES radiating right === -->
  <!-- Node 1 - teal -->
  <line x1="122" y1="72" x2="140" y2="62" stroke="#26c6da" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="143" cy="60" r="4" stroke="#26c6da" stroke-width="1.8" fill="none"/>
  <circle cx="143" cy="60" r="1.5" fill="#26c6da"/>

  <!-- Node 2 - yellow -->
  <line x1="124" y1="82" x2="148" y2="78" stroke="#ffca28" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="152" cy="77" r="4" stroke="#ffca28" stroke-width="1.8" fill="none"/>
  <circle cx="152" cy="77" r="1.5" fill="#ffca28"/>

  <!-- Node 3 - pink/purple -->
  <line x1="122" y1="96" x2="144" y2="96" stroke="#e040fb" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="148" cy="96" r="4" stroke="#e040fb" stroke-width="1.8" fill="none"/>
  <circle cx="148" cy="96" r="1.5" fill="#e040fb"/>

  <!-- Node 4 - green -->
  <line x1="120" y1="110" x2="140" y2="114" stroke="#66bb6a" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="144" cy="115" r="4" stroke="#66bb6a" stroke-width="1.8" fill="none"/>
  <circle cx="144" cy="115" r="1.5" fill="#66bb6a"/>

  <!-- Node 5 - red/orange -->
  <line x1="116" y1="64" x2="132" y2="50" stroke="#ef5350" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="135" cy="47" r="4" stroke="#ef5350" stroke-width="1.8" fill="none"/>
  <circle cx="135" cy="47" r="1.5" fill="#ef5350"/>

  <!-- Connector line between nodes 1 and 2 -->
  <line x1="143" y1="64" x2="148" y2="73" stroke="#b2ebf2" stroke-width="1.2" opacity="0.8"/>
  <!-- Connector between nodes 2 and 3 -->
  <line x1="152" y1="81" x2="148" y2="92" stroke="#e1bee7" stroke-width="1.2" opacity="0.8"/>
</svg>
